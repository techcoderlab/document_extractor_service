# ─────────────────────────────────────────────────────
# Module   : docker-compose.yml
# Layer    : Infrastructure / Deployment
# Pillar   : P0 (Bootstrap), P5 (Scalability)
# Complexity: O(1) time, O(1) space
# ─────────────────────────────────────────────────────

version: "3.8"

services:
  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discord_doc_extractor
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
